<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Week Recovery Protocol</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #090a0f;
    --panel: #11131b;
    --panel-2: #171b27;
    --line: #252b3b;
    --text: #f5f7fb;
    --muted: #a4acba;
    --dim: #697285;
    --warn: #ff7a7a;
  }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
    padding: 36px 16px 48px;
  }
  #app { max-width: 520px; margin: 0 auto; }
  button { font-family: inherit; cursor: pointer; outline: none; }
  .header { margin-bottom: 20px; }
  .header-tag {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 { font-size: 24px; line-height: 1.15; letter-spacing: 0; }
  .header-sub { color: var(--dim); font-size: 12px; line-height: 1.5; margin-top: 8px; }
  .phase-row, .view-row, .day-row { display: flex; gap: 6px; }
  .phase-row { margin-bottom: 18px; }
  .phase-btn, .view-btn, .day-btn {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--dim);
    border-radius: 7px;
    font-weight: 850;
  }
  .phase-btn { flex: 1; min-width: 0; padding: 9px 3px; font-size: 10px; letter-spacing: 0.7px; }
  .phase-btn-sub { margin-top: 2px; font-size: 9px; font-weight: 500; opacity: 0.75; }
  .phase-goal {
    border-left: 2px solid;
    background: var(--panel);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 20px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }
  .view-row { margin-bottom: 22px; }
  .view-btn {
    flex: 1;
    padding: 8px 0;
    background: transparent;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .day-row { margin-bottom: 24px; }
  .day-btn { flex: 1; min-width: 0; padding: 8px 0; font-size: 11px; }
  .session-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .session-name { font-size: 16px; font-weight: 850; }
  .session-label { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.35; }
  .session-time { color: var(--dim); font-size: 11px; white-space: nowrap; }
  .session-loc {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 850;
    letter-spacing: 0.9px;
    vertical-align: 1px;
  }
  .band, .rest-card, .gate-block, .source-block {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .band { padding: 13px 14px; margin-bottom: 16px; border-left: 2px solid var(--line); }
  .band-title, .ex-target summary, .gate-title, .source-title {
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .band-title { color: var(--dim); margin-bottom: 9px; }
  ul { list-style: none; }
  .simple-list li {
    position: relative;
    padding-left: 14px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
    margin: 5px 0;
  }
  .simple-list li::before {
    content: "";
    position: absolute;
    top: 0.72em;
    left: 1px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
  }
  .ex-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 9px;
    overflow: hidden;
  }
  .ex-header {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    padding: 12px 13px;
  }
  .ex-num {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
  }
  .ex-name { color: var(--text); font-size: 13px; font-weight: 760; line-height: 1.25; }
  .ex-sets { color: var(--dim); margin-top: 3px; font-size: 11px; line-height: 1.35; }
  .ex-video-tag {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 6px;
    border: 1px solid currentColor;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 1px;
  }
  .ex-arrow { color: var(--dim); font-size: 14px; transition: transform 0.2s; }
  .ex-arrow.open { transform: rotate(180deg); }
  .ex-detail { display: none; padding: 0 13px 13px 47px; }
  .ex-detail.open { display: block; }
  .ex-detail-text { color: var(--muted); font-size: 12px; line-height: 1.55; margin-bottom: 10px; }
  .ex-target { border-radius: 6px; overflow: hidden; margin-top: 8px; }
  .ex-target summary { cursor: pointer; list-style: none; padding: 8px 10px; }
  .ex-target summary::-webkit-details-marker { display: none; }
  .ex-target-body { padding: 0 10px 10px; color: var(--muted); font-size: 11px; line-height: 1.5; }
  .video-thumb, .video-frame {
    position: relative;
    margin: 10px 0;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 16 / 9;
  }
  .video-thumb { cursor: pointer; }
  .video-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.88;
    transition: opacity 0.2s;
  }
  .video-thumb:hover img { opacity: 1; }
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: rgba(230, 32, 32, 0.9);
  }
  .play-btn::before {
    content: "▶";
    position: absolute;
    left: 21px;
    top: 14px;
    color: white;
    font-size: 21px;
  }
  .video-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
  .video-fallback {
    display: inline-block;
    margin-bottom: 10px;
    padding: 4px 8px;
    border: 1px solid #303648;
    border-radius: 5px;
    background: var(--panel-2);
    color: var(--muted);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .video-note {
    margin-bottom: 10px;
    padding: 8px 10px;
    border-left: 2px solid #f0a45d;
    border-radius: 6px;
    background: rgba(240, 164, 93, 0.09);
    color: #d7b08e;
    font-size: 11px;
    line-height: 1.5;
  }
  .video-note-label { color: #f0a45d; font-size: 9px; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 4px; }
  .rest-card { padding: 24px 18px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .rest-title { color: var(--text); font-weight: 850; margin-bottom: 5px; }
  .gate-block { padding: 16px; margin-bottom: 14px; border-left: 2px solid; }
  .gate-title { margin-bottom: 4px; }
  .gate-sub { color: var(--dim); font-size: 11px; margin-bottom: 10px; line-height: 1.5; }
  .gate-item {
    display: grid;
    grid-template-columns: 20px minmax(0, 1fr);
    gap: 7px;
    padding: 6px 0;
    border-top: 1px solid #202534;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }
  .gate-num { color: var(--dim); font-weight: 900; }
  .gate-fail {
    margin-top: 10px;
    padding: 9px 10px;
    background: rgba(255, 122, 122, 0.08);
    border-left: 2px solid rgba(255, 122, 122, 0.55);
    border-radius: 6px;
    color: #ffadad;
    font-size: 11px;
    line-height: 1.5;
  }
  .source-block { padding: 13px 14px; margin-bottom: 10px; }
  .source-title { color: var(--dim); margin-bottom: 8px; }
  .source-link { display: block; color: var(--muted); text-decoration: none; font-size: 12px; line-height: 1.5; padding: 5px 0; }
  .source-link:hover { color: var(--text); }
  @media (max-width: 420px) {
    body { padding-left: 12px; padding-right: 12px; }
    .phase-row { gap: 4px; }
    .phase-btn { font-size: 9px; letter-spacing: 0.3px; }
    .ex-detail { padding-left: 13px; }
  }
</style>
</head>
<body>
<div id="app"></div>

const COOLDOWN = {
  "OUTDOOR A": ["60-sec log: knee baseline, left hip baseline, elbow baseline, right-knee catches", "Easy walking 2 min"],
  "OUTDOOR B": ["60-sec log: knee baseline, left hip baseline, elbow baseline, right-knee catches", "Easy walking 2 min"],
  "LONG HOME": ["Gentle elbow range of motion x10", "Log next-morning elbow stiffness tomorrow", "Log whether balance ended before arch collapse"],

  { label: "Infrapatellar fat pad review: activity modification and impingement avoidance", url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC4789926/" },
  { label: "AAOS meniscal guideline: mechanical symptoms stay on the review radar", url: "https://www.aaos.org/quality/quality-programs/acute-isolated-meniscal-pathology/" },
  { label: "Nonarthritic hip CPG: front/groin pain is a symptom cluster", url: "https://www.apta.org/patient-care/evidence-based-practice-resources/cpgs/nonarthritic-hip-joint-pain-cpg" },

];

  {

    sub: "The weekly work must keep matching the imaging and symptom drivers.",

      "Bilateral grade I ACL signal plus hamstring underdevelopment: daily heel-bridge isometrics, banded hamstring curls, light unilateral machine work only after clean bilateral work, and single-leg balance at least 3x/week.",
      "Right lateral meniscus anterior-horn signal and mechanical catch history: avoid uncontrolled open-chain rotation, keep leg press depth symptom-gated, and monitor catch, swelling, locking, and giving way.",
      "Left anterior hip/groin pattern: hip flexor stretch, supine 90/90 rotation, clamshells, standing hip abduction, and later wall-hinge work only inside clean range.",
      "Foot pronation and tib-fib control symptoms: short-foot, toe yoga, arch-controlled calf work, and balance quality gates.",
      "Left elbow triceps insertion enthesitis with elbow fluid: slow banded triceps loading, exact banded isometrics, and shoulder/scapular support without snapping lockout."
    ],
    fail: "A symptom driver without a weekly target means the phase is incomplete."
  },
  {
    title: "8-week exit",
    sub: "This is readiness for the next training block, not a promise that symptoms are gone.",

    ],
    fail: "If mechanical symptoms persist, prepare a clinician review packet before higher intensity."
  }
];

const VIDEO = {
  shortFoot: "DoEIW4Y8MEo",
  toeYoga: "zSFlNXMtArw",
  hipFlexor: "SDsjnuCf90U",
  hipRotation: "iHAdSwm9ys0",
  quadIso: "O1ZLyjK_V8s",
  hamBridge: "qs3O-kowfTM",
  hamCurl: "LtTcXXgeRYo",
  hamCurlSingle: "9ATyxEznRRk",
  balance: "HTVVv4ESgms",
  tricepsPressdown: "xZ4yXK36X4M",
  tricepsOverhead: "8-q04odgg4M",
  tricepsIso: "12NUE0FLvag",
  shoulderER0: "KMneHZE_t3w",
  shoulderER90: "U7FCMR0A63g",
  pullApart: "MnDpmNYUjbc",
  yRaise: "69sfvYgWK2Y",
  clamshell: "qNjh-nePA0s",
  hipAbduction: "l96rtpWwRbs",

  hipHinge: "seMtcXDB3uQ"
};

function ex(name, sets, description, target, video, video_note) {
  const item = { name, sets, description, target };
  if (video) item.video = video;
  if (video_note) item.video_note = video_note;
  return item;
}

function spinBike(sets) {
  return ex(
    "Spin bike",
    sets,
    "Bike comes before leg press. Seat high, low resistance, smooth cadence, and quiet knee tracking.",
    "Best match for bilateral Hoffa edema and patellar cartilage irritation: warm volume without deep knee compression or end-range knee pinch."
  );
}

function legPress(sets, description) {
  return ex(
    "Leg press - bilateral",
    sets,
    description,
    "Keeps lower-body strength while controlling the variables that matter for Hoffa edema, patellar tracking, and meniscus catch: depth, foot arch, tempo, and next-day baseline."
  );
}

function tempoLegPress(sets) {
  return ex(
    "Leg press - light tempo bilateral",
    sets,
    "Same stance as Monday, lighter load, slower tempo. Stop before deep knee bend or front-inner kneecap rise.",
    "Maintains a second machine exposure without turning Tuesday into another heavy lower-body day."
  );
}

function legPressPause(sets) {
  return ex(
    "Leg press isometric pause",
    sets,
    "Pause in the comfortable mid-range. The pause is the stimulus; do not chase heavier load.",
    "Adds calm time-under-tension for the patellofemoral system without terminal extension or deep flexion."
  );
}

function singleLegPress(sets) {
  return ex(
    "Light single-leg leg press",
    sets,
    "Use only after clean bilateral sets. Keep the load very light, use hand support, and stop if arch or knee line fails.",
    "Introduces unilateral strength for the bilateral grade I ACL signal without requiring floor balance under load."
  );
}

function calfArch(sets) {
  return ex(
    "Calf raise + arch hold",
    sets,
    "Use a smooth bilateral raise. After the set, hold the arch active without toe gripping.",
    "Connects calf strength to pronation control so the foot does not feed knee valgus."
  );
}

function hamCurl(sets, single = false) {
  return ex(
    single ? "Single-leg banded hamstring curl" : "Banded prone hamstring curl",
    sets,
    single ? "Anchor band low behind you. Curl one heel toward the glute slowly, then return slower than you came in." : "Anchor band low behind you. Lie face down, curl both heels toward the glutes slowly, then return with a 3 sec eccentric.",
    "Directly addresses the hamstring-underdevelopment gap and supports the bilateral grade I ACL signal by giving the hamstrings real knee-flexion work.",
    single ? VIDEO.hamCurlSingle : VIDEO.hamCurl,
    "Band stays light enough that the knee does not twist or cramp."
  );
}

function heelBridge(sets) {
  return ex(
    "Hamstring heel-bridge isometric",
    sets,
    "Heels slightly farther from hips than a normal bridge. Lift just high enough to feel hamstrings, not low back or front hip.",
    "Builds posterior-chain support for the left anterior hip pattern and improves the hamstring side of the quad-to-hamstring balance.",
    VIDEO.hamBridge
  );
}

function balance(sets) {
  return ex(
    "Single-leg balance - floor",
    sets,
    "Barefoot at home. Stand tall near a wall, set the arch first, then lift one foot. End the hold before arch collapse or knee drift.",
    "Covers the missing ACL-control piece: single-leg proprioception at least 3x/week without unstable surfaces.",
    VIDEO.balance,
    "Use the stance concept only. Your gate is arch and knee-line quality, not max time."
  );
}

function tricepsPressdown(sets) {
  return ex(
    "Banded triceps pressdown",
    sets,
    "Band anchored high. Elbows pinned, shoulder relaxed, press down slowly and stop just short of hard lockout.",
    "Main slow-loading pattern for left triceps insertion enthesitis without snapping the irritated end range.",
    VIDEO.tricepsPressdown,
    "Slow eccentric matters more than band tension."
  );
}

function tricepsOverhead(sets) {
  return ex(
    "Banded triceps overhead extension",
    sets,
    "Band anchored low behind you. Elbows point forward, lower behind head, extend smoothly, and stop short of hard lockout.",
    "Second tendon angle for the left triceps insertion while still keeping load progressive and controlled.",
    VIDEO.tricepsOverhead,
    "No aggressive top lockout."
  );
}

function tricepsIso(sets, angle) {
  return ex(
    "Banded elbow-extension isometric",
    sets,
    `Band anchored behind you at elbow height. Hold elbow at ${angle}; press gently into extension without changing the angle.`,
    "Replaces the ambiguous surface-press setup with one exact elbow-extension angle for tendon load without joint motion.",
    VIDEO.tricepsIso,

const phaseColors = ["#76e4a6", "#6ee7f9", "#f2c94c", "#ff9f68"];
const primerColor = "#f4d35e";

let state = {
  activePhase: 0,
  activeDay: 0,
  expandedEx: null,
  view: "schedule",
  primerActive: true
};

let playingVideos = new Set();

function esc(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function list(items) {
  return `<ul class="simple-list">${items.map(item => `<li>${esc(item)}</li>`).join("")}</ul>`;
}

function playVideo(videoId, ev) {
  if (ev) ev.stopPropagation();
  playingVideos.add(videoId);
  render();
}

function renderVideoBlock(ex) {
  let html = "";
  const videoEntries = ex.videos ? ex.videos : (ex.video ? [{ id: ex.video }] : []);
  videoEntries.forEach(video => {
    const id = typeof video === "string" ? video : video.id;
    const label = typeof video === "string" ? "" : video.label;
    if (!id) return;
    if (playingVideos.has(id)) {
      html += `<div class="video-frame"><iframe src="https://www.youtube.com/embed/${esc(id)}?autoplay=1&playsinline=1&rel=0" allowfullscreen allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"></iframe></div>`;
    } else {
      html += `<div class="video-thumb" onclick="playVideo('${esc(id)}', event)"><img src="https://img.youtube.com/vi/${esc(id)}/0.jpg" alt="Exercise demo"><div class="play-btn"></div></div>`;
    }
    html += `<a class="video-fallback" href="https://www.youtube.com/watch?v=${esc(id)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open${label ? " " + esc(label) : ""} on YouTube -></a>`;
  });
  if (ex.video_note) {
    html += `<div class="video-note"><div class="video-note-label">NOTE</div>${esc(ex.video_note)}</div>`;
  }
  return html;
}

function renderExerciseCard(ex, i, accentColor, lockedOpen = false) {
  const isOpen = lockedOpen || state.expandedEx === i;
  const hasVideo = !!ex.video || !!ex.videos;
  return `<div class="ex-card" onclick="${lockedOpen ? "" : `toggleEx(${i})`}">
    <div class="ex-header">
      <div class="ex-num" style="background:${accentColor}18;color:${accentColor}">${i + 1}</div>
      <div>
        <div class="ex-name">${esc(ex.name)}</div>
        <div class="ex-sets">${esc(ex.sets)}</div>
        ${hasVideo ? `<span class="ex-video-tag" style="color:${accentColor}">VIDEO</span>` : ""}
      </div>
      <div class="ex-arrow${isOpen ? " open" : ""}">${lockedOpen ? "" : "▾"}</div>
    </div>
    <div class="ex-detail${isOpen ? " open" : ""}">
      ${renderVideoBlock(ex)}
      <div class="ex-detail-text">${esc(ex.description)}</div>
      <details class="ex-target" style="background:${accentColor}10;color:${accentColor}" onclick="event.stopPropagation()">
        <summary>WHY THIS TARGETS YOU</summary>
        <div class="ex-target-body">${esc(ex.target)}</div>
      </details>
    </div>
  </div>`;
}

function render() {
  const { activePhase, activeDay, view, primerActive } = state;
  const accentColor = primerActive ? primerColor : phaseColors[activePhase];
  const currentSession = WEEK_SCHEDULE[activeDay];
  const exList = currentSession ? ((sessions[activePhase] && sessions[activePhase][currentSession.session]) || []) : [];
  let html = "";

  html += `<div class="header">
    <div class="header-tag" style="color:${accentColor}">8-WEEK RECOVERY PROTOCOL</div>
    <h1>REBUILD THE BASE</h1>
    <div class="header-sub">Four 2-week phases. Concrete exercises, exact doses, video demos, and progression guardrails.</div>
  </div>`;

  html += `<div class="phase-row">
    <button class="phase-btn" onclick="setState({primerActive:true,expandedEx:null})" style="background:${primerActive ? primerColor + "18" : ""};border-color:${primerActive ? primerColor : ""};color:${primerActive ? primerColor : ""}">
      <div>PRIMER</div><div class="phase-btn-sub">DAILY</div>
    </button>`;
  PHASES.forEach((p, i) => {
    const active = !primerActive && activePhase === i;
    const c = phaseColors[i];
    html += `<button class="phase-btn" onclick="setState({primerActive:false,activePhase:${i},expandedEx:null})" style="background:${active ? c + "18" : ""};border-color:${active ? c : ""};color:${active ? c : ""}">
      <div>P${i + 1}</div><div class="phase-btn-sub">${esc(p.weeks)}</div>
    </button>`;
  });
  html += `</div>`;

  if (primerActive) {
    html += `<div class="phase-goal" style="border-left-color:${accentColor};background:${accentColor}12">Daily primer: 12-15 minutes. Complete the exercises in order.</div>`;
    DAILY_MOBILITY.forEach((m, i) => html += renderExerciseCard(m, i, accentColor, true));
    document.getElementById("app").innerHTML = html;
    return;
  }

  const phase = PHASES[activePhase];
  html += `<div class="phase-goal" style="border-left-color:${accentColor};background:${accentColor}12"><strong>${esc(phase.title)}.</strong> ${esc(phase.goal)}</div>`;

  html += `<div class="view-row">
    ${["schedule", "gates", "guardrails"].map(v => `<button class="view-btn" onclick="setState({view:'${v}'})" style="background:${view === v ? "#1b1f2b" : ""};color:${view === v ? "#fff" : ""};border-color:${view === v ? "#343b50" : ""}">${v}</button>`).join("")}
  </div>`;

  if (view === "schedule") {
    html += `<div class="day-row">${WEEK_SCHEDULE.map((d, i) => `<button class="day-btn" onclick="setState({activeDay:${i},expandedEx:null})" style="background:${activeDay === i ? accentColor + "18" : ""};border-color:${activeDay === i ? accentColor : ""};color:${activeDay === i ? accentColor : ""}">${esc(d.day)}</button>`).join("")}</div>`;

    const locBadge = currentSession.loc ? `<span class="session-loc" style="background:${accentColor}18;color:${accentColor};border:1px solid ${accentColor}55">${esc(currentSession.loc)}</span>` : "";
    html += `<div class="session-header">
      <div>
        <span class="session-name">${esc(currentSession.session)}</span>${locBadge}
        <span class="session-label">${esc(currentSession.label)}</span>
      </div>
      <span class="session-time">${esc(currentSession.time)}</span>
    </div>`;

    if (currentSession.session === "REST") {
      html += `<div class="rest-card">
        <div class="rest-title">REST DAY</div>
        Full rest outside the daily primer. No makeup sessions.
      </div>`;
    } else {
      const warmup = WARMUP[currentSession.session] || [];
      if (warmup.length) html += `<div class="band"><div class="band-title">Warmup</div>${list(warmup)}</div>`;
      exList.forEach((ex, i) => html += renderExerciseCard(ex, i, accentColor));
      const cooldown = COOLDOWN[currentSession.session] || [];
      if (cooldown.length) html += `<div class="band"><div class="band-title">Cooldown + Log</div>${list(cooldown)}</div>`;
    }
  }

  if (view === "gates") {
    GUARDRAILS.slice(1).forEach((g, i) => {
      const c = phaseColors[Math.min(i + 1, phaseColors.length - 1)];
      html += `<div class="gate-block" style="border-left-color:${c}">
        <div class="gate-title" style="color:${c}">${esc(g.title)}</div>
        <div class="gate-sub">${esc(g.sub)}</div>
        ${g.items.map((item, j) => `<div class="gate-item"><span class="gate-num">${j + 1}.</span><span>${esc(item)}</span></div>`).join("")}
        ${g.fail ? `<div class="gate-fail">${esc(g.fail)}</div>` : ""}
      </div>`;
    });
  }

  if (view === "guardrails") {
    GUARDRAILS.forEach((g, i) => {
      const c = phaseColors[Math.min(i, phaseColors.length - 1)];
      html += `<div class="gate-block" style="border-left-color:${c}">
        <div class="gate-title" style="color:${c}">${esc(g.title)}</div>
        <div class="gate-sub">${esc(g.sub)}</div>
        ${g.items.map((item, j) => `<div class="gate-item"><span class="gate-num">${j + 1}.</span><span>${esc(item)}</span></div>`).join("")}
        ${g.fail ? `<div class="gate-fail">${esc(g.fail)}</div>` : ""}
      </div>`;
    });
    html += `<div class="source-block"><div class="source-title">Evidence Anchors</div>${evidenceAnchors.map(s => `<a class="source-link" href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.label)}</a>`).join("")}</div>`;
  }

  document.getElementById("app").innerHTML = html;
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function toggleEx(i) {
  state.expandedEx = state.expandedEx === i ? null : i;
  render();
}

render();
</script>
